<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; gap: 0; }
  .row { display: grid; grid-template-columns: 90px 1fr 60px; align-items: baseline; gap: 18px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .sz  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-align: right; }
  .smp { font-family: var(--font-sans); color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style></head>
<body><div class="card">
  <div class="row"><div class="lbl">display-xl</div><div class="smp" style="font-size: 56px; font-weight:300; letter-spacing:-0.02em; line-height:1">Tecnología</div><div class="sz">56 / 1.02</div></div>
  <div class="row"><div class="lbl">display-lg</div><div class="smp" style="font-size: 42px; font-weight:300; letter-spacing:-0.02em; line-height:1">Somos aliados.</div><div class="sz">42 / 1.05</div></div>
  <div class="row"><div class="lbl">display-md</div><div class="smp" style="font-size: 30px; font-weight:300; letter-spacing:-0.01em;">Elementos</div><div class="sz">30 / 1.15</div></div>
  <div class="row"><div class="lbl">h3</div><div class="smp" style="font-size: 22px; font-weight:400;">Desarrollo web</div><div class="sz">22 / 1.2</div></div>
  <div class="row"><div class="lbl">body</div><div class="smp" style="font-size: 16px; color: var(--fg-muted);">Diseñamos infraestructuras impecables.</div><div class="sz">16 / 1.55</div></div>
  <div class="row"><div class="lbl">caption</div><div class="smp" style="font-size: 12px; color: var(--fg-subtle);">Suspendisse nisi diam, convallis eget.</div><div class="sz">12 / 1.4</div></div>
</div></body></html>
