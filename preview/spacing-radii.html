<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 16px; }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display:flex; flex-direction:column; gap: 6px; align-items: center; }
  .box { width: 72px; height: 72px; background: var(--bg-elevated); border: 1px solid var(--homium-cyan); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .px  { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs</div><div class="px">4</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">sm</div><div class="px">8</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="lbl">md</div><div class="px">14</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="lbl">lg</div><div class="px">20</div></div>
    <div class="item"><div class="box" style="border-radius:28px"></div><div class="lbl">xl</div><div class="px">28</div></div>
    <div class="item"><div class="box" style="border-radius:999px; width: 96px; height: 40px;"></div><div class="lbl">pill</div><div class="px">∞</div></div>
  </div>
</div></body></html>
