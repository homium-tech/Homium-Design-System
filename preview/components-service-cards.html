<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; gap: 18px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .scard {
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 22px 26px;
    background: linear-gradient(180deg, #2f0750 0%, #290640 80%);
    display: flex; flex-direction: column; gap: 14px;
    transition: all 200ms var(--ease-out);
  }
  .scard.hover { border-color: var(--homium-cyan); transform: translateY(-2px); }
  .scard h3 { margin: 0; font-size: 22px; font-weight: 400; line-height: 1.15; }
  .scard p  { margin: 0; font-size: 13px; color: var(--fg-muted); line-height: 1.55; }
  .bk { color: var(--homium-cyan); font-size: 12px; font-style: italic; font-weight: 300; }
  .bk::before { content: '[ '; } .bk::after { content: ' ]'; }
  .arrow { width: 28px; height: 28px; border:1px solid var(--homium-cyan); border-radius:50%; display:flex; align-items:center; justify-content:center; color: var(--homium-cyan); font-size: 14px;}
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="scard">
      <h3>Desarrollo<br>web</h3>
      <div class="bk">a medida</div>
      <p>Productos digitales construidos con un stack moderno, escalable y mantenible.</p>
    </div>
    <div class="scard hover">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <h3>Consultoría<br>tecnológica</h3>
        <div class="arrow">↗</div>
      </div>
      <div class="bk">para líderes</div>
      <p>Arquitectura, auditoría y dirección técnica para equipos de tecnología.</p>
    </div>
  </div>
</div></body></html>
