<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 18px; }
  .input {
    display:flex; flex-direction:column; gap: 4px;
    padding: 10px 0 6px;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    transition: border-color 160ms var(--ease-out);
  }
  .input.focus { border-color: var(--homium-cyan); }
  .input.filled { border-color: rgba(255,255,255,0.5); }
  .input label { font-size: 11px; color: var(--fg-muted); letter-spacing: 0.06em; }
  .input .val { font-size: 16px; color: var(--fg); min-height: 22px; }
  .input.focus .val { color: var(--fg); }
  .input.empty .val { color: var(--fg-subtle); }
  .caret { display:inline-block; width: 1px; height: 18px; background: var(--homium-cyan); vertical-align: -3px; margin-left: 1px; animation: bl 1s steps(2) infinite; }
  @keyframes bl { 50% { opacity: 0;} }
</style></head>
<body><div class="card">
  <div class="input filled">
    <label>Nombre</label>
    <div class="val">Mariana Restrepo</div>
  </div>
  <div class="input focus">
    <label>Correo electrónico</label>
    <div class="val">mariana@<span class="caret"></span></div>
  </div>
  <div class="input empty">
    <label>Empresa</label>
    <div class="val">&nbsp;</div>
  </div>
</div></body></html>
