<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; gap: 16px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display:flex; flex-direction:column; gap: 10px; align-items: center; }
  .box {
    width: 96px; height: 64px;
    background: var(--bg-elevated);
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .lift  { box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
  .float { box-shadow: 0 18px 48px rgba(0,0,0,0.45); }
  .cyan  { box-shadow: 0 0 24px rgba(0,255,255,0.45); border-color: var(--homium-cyan); }
  .green { box-shadow: 0 0 24px rgba(90,234,162,0.40); border-color: var(--homium-green); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .desc { font-size: 10px; color: var(--fg-subtle); text-align: center; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="item"><div class="box lift"></div><div class="lbl">shadow-card</div><div class="desc">elevated cards</div></div>
    <div class="item"><div class="box float"></div><div class="lbl">shadow-lift</div><div class="desc">modals / popovers</div></div>
    <div class="item"><div class="box cyan"></div><div class="lbl">glow-cyan</div><div class="desc">CTA hover / focus</div></div>
    <div class="item"><div class="box green"></div><div class="lbl">glow-green</div><div class="desc">success / secondary</div></div>
  </div>
</div></body></html>
