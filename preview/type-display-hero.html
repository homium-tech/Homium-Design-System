<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; gap: 0; min-height: 260px; }
  .hero { font-family: var(--font-display); font-weight: 300; font-size: 56px; line-height: 1.02; letter-spacing: -0.02em; }
  .hero em { font-style: italic; font-weight: 300; color: var(--homium-cyan); }
  .hero .period { color: var(--fg); }
  .meta { margin-top: 18px; display:flex; gap:16px; font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
  .meta span b { color: var(--fg-muted); font-weight: 500; }
</style></head>
<body><div class="card">
  <div class="hero">Tecnología sin<br>complicaciones<span class="period">.</span></div>
  <div class="meta">
    <span><b>Rubik</b> · 56px / 1.02</span>
    <span>weight 400 · italic 300 for accent</span>
    <span>tracking -0.02em</span>
  </div>
</div></body></html>
