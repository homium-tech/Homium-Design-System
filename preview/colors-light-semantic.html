<!doctype html>
<html class="theme-light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .card { padding: 22px 28px; gap: 10px; }
  .row2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tok { display:flex; flex-direction:column; gap: 8px; }
  .sw { height: 56px; border-radius: 10px; border: 1px solid var(--border); }
  .meta b { font-size: 12px; font-weight: 500; display:block; color: var(--fg); }
  .meta span { font-size: 11px; font-family: var(--font-mono); color: var(--fg-subtle); }
  .glyph { display:flex; align-items:center; justify-content:center; font-size: 14px; }
</style></head>
<body class="theme-light"><div class="card">
  <div class="row2">
    <div class="tok"><div class="sw" style="background:var(--bg)"></div>
      <div class="meta"><b>bg</b><span>#FFFFFF</span></div></div>
    <div class="tok"><div class="sw" style="background:var(--bg-elevated)"></div>
      <div class="meta"><b>bg-elevated</b><span>#FAF7FC</span></div></div>
    <div class="tok"><div class="sw" style="background:var(--bg-sunken)"></div>
      <div class="meta"><b>bg-sunken</b><span>#F1E9F7</span></div></div>
    <div class="tok"><div class="sw" style="background:var(--surface-cyan)"></div>
      <div class="meta"><b>surface-cyan</b><span>#00FFFF</span></div></div>
  </div>
  <div class="row2" style="margin-top:6px;">
    <div class="tok"><div class="sw glyph" style="background:#fff; color: var(--fg);">Aa</div>
      <div class="meta"><b>fg</b><span>#4A1170</span></div></div>
    <div class="tok"><div class="sw glyph" style="background:#fff; color: var(--fg-muted);">Aa</div>
      <div class="meta"><b>fg-muted</b><span>rgba(74,17,112,.78)</span></div></div>
    <div class="tok"><div class="sw glyph" style="background:#fff; color: var(--accent-display);">Aa</div>
      <div class="meta"><b>accent-display</b><span>#8E57BF</span></div></div>
    <div class="tok"><div class="sw glyph" style="background:#fff; color: var(--accent);">Aa</div>
      <div class="meta"><b>accent</b><span>#00B8B8</span></div></div>
  </div>
</div></body></html>
