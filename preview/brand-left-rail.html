<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; gap: 20px; }
  .grid { display: grid; grid-template-columns: 220px 1fr; gap: 32px; align-items: center; }
  .nav { display:flex; flex-direction: column; gap: 14px; font-size: 12px; }
  .nav li { list-style: none; display:flex; align-items:center; gap: 10px; color: var(--fg-subtle); }
  .nav li .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .nav li.active { color: var(--homium-cyan); }
  .nav li.active .dot { background: var(--homium-cyan); box-shadow: 0 0 12px var(--homium-cyan); }
  .nav li.done { color: var(--fg-muted); }
  .nav li.done .dot { background: var(--homium-cyan); opacity: 0.5;}
  .nav ul { padding: 0; margin: 0; display:flex; flex-direction:column; gap: 12px; }
  .desc { font-size: 13px; color: var(--fg-muted); line-height: 1.55; }
  .desc b { color: var(--fg); font-weight: 500; }
  .ttl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <div class="grid">
    <ul class="nav">
      <li class="done"><span class="dot"></span>Inicio</li>
      <li class="done"><span class="dot"></span>Aliados</li>
      <li class="active"><span class="dot"></span>Productos</li>
      <li><span class="dot"></span>Gente</li>
      <li><span class="dot"></span>Trabajo</li>
      <li><span class="dot"></span>Hablemos</li>
    </ul>
    <div>
      <div class="ttl" style="margin-bottom: 8px;">Left-rail mini-nav</div>
      <div class="desc">A persistent vertical section index on the left edge. <b>Cyan dot = current.</b> Sits in the gutter, never interrupts the content column.</div>
    </div>
  </div>
</div></body></html>
