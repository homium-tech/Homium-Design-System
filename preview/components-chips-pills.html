<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; gap: 18px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font: 400 14px var(--font-sans);
    color: var(--fg);
    background: transparent;
    cursor: pointer; transition: all 160ms var(--ease-out);
  }
  .chip.active { background: var(--homium-purple); border-color: var(--homium-cyan); color: var(--fg); box-shadow: 0 0 0 1px var(--homium-cyan) inset;}
  .pill {
    padding: 6px 14px; border-radius: 999px;
    font: 500 12px var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .pill.cyan  { background: var(--homium-cyan); color: var(--homium-purple); }
  .pill.green { background: var(--homium-green); color: var(--homium-purple); }
  .pill.ghost { background: transparent; color: var(--homium-cyan); border:1px solid var(--homium-cyan); }
  .ttl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body><div class="card">
  <div>
    <div class="ttl" style="margin-bottom: 10px;">Category chips · Nuestro Trabajo</div>
    <div class="row">
      <span class="chip active">Todos</span>
      <span class="chip">Procesamiento de datos</span>
      <span class="chip">Business CMR</span>
      <span class="chip">Clips animados</span>
      <span class="chip">Ilustración</span>
      <span class="chip">Sitios web</span>
    </div>
  </div>
  <div>
    <div class="ttl" style="margin-bottom: 10px;">Social pills · footer</div>
    <div class="row">
      <span class="pill cyan">TWITTER</span>
      <span class="pill green">INSTAGRAM</span>
      <span class="pill ghost">LINKEDIN</span>
    </div>
  </div>
</div></body></html>
