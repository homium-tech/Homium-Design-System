<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; gap: 22px; }
  .grid { display:grid; grid-template-columns: 2fr 1fr; gap: 14px; align-items: stretch; }
  .lk { border-radius: 14px; padding: 28px; display:flex; align-items:center; justify-content: center; min-height: 110px; }
  .on-purple { background: var(--homium-purple); border: 1px solid var(--border); }
  .on-white  { background: var(--homium-white); }
  .lk img { display:block; height: 44px; width: auto; }
  .ttl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.08em; text-transform: uppercase; }
  .cap { display:flex; flex-direction:column; gap: 8px; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="cap">
      <div class="lk on-purple"><img src="../assets/logo/homium-wordmark-white.svg" alt="HOMIUM wordmark" /></div>
      <div class="ttl">Wordmark — light · on dark surfaces</div>
    </div>
    <div class="cap">
      <div class="lk on-white"><img src="../assets/logo/homium-wordmark-purple.svg" alt="HOMIUM wordmark" /></div>
      <div class="ttl">Wordmark — dark · on light</div>
    </div>
  </div>
</div></body></html>
