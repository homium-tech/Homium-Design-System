<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; gap: 0; }
  .ratio { display: grid; grid-template-columns: 60fr 20fr 20fr; gap: 6px; height: 96px; }
  .ratio > div { border-radius: 14px; position: relative; display:flex; align-items:flex-end; padding:10px 12px; font-size: 11px; font-family: var(--font-mono); }
  .p { background: var(--homium-purple); color: var(--fg); border: 1px solid var(--border); }
  .c { background: var(--homium-cyan);   color: var(--homium-purple); }
  .g { background: var(--homium-green);  color: var(--homium-purple); }
  .pct { position:absolute; top:10px; left:12px; font-size:18px; font-weight: 500; letter-spacing:-0.02em; font-family: var(--font-sans); }
  .note { margin-top: 14px; font-size: 12px; color: var(--fg-muted); }
  .note b { color: var(--fg); font-weight: 500; }
</style></head>
<body><div class="card">
  <div class="ratio">
    <div class="p"><span class="pct">60%</span>#290640</div>
    <div class="c"><span class="pct">20%</span>#00FFFF</div>
    <div class="g"><span class="pct">20%</span>#5AEAA2</div>
  </div>
  <div class="note">Brand ratio. <b>Purple</b> for the canvas, <b>cyan</b> for CTAs and italic accents, <b>green</b> for tags and secondary highlights. White is part of the palette; black-90% for long-form on light surfaces.</div>
</div></body></html>
