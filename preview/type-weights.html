<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; gap: 14px; }
  .wts { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .wt { display:flex; flex-direction:column; gap: 4px; }
  .glyph { font-family: 'Rubik', sans-serif; font-size: 48px; line-height: 1; letter-spacing: -0.02em; color: var(--fg); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-transform: uppercase;}
  .name { font-size: 12px; color: var(--fg-muted); }
</style></head>
<body><div class="card">
  <div class="lbl">Rubik · variable · 300 → 900 + italic</div>
  <div class="wts">
    <div class="wt"><div class="glyph" style="font-weight:300;">Aa</div><div class="name">Light 300</div></div>
    <div class="wt"><div class="glyph" style="font-weight:400;">Aa</div><div class="name">Regular 400</div></div>
    <div class="wt"><div class="glyph" style="font-weight:500;">Aa</div><div class="name">Medium 500</div></div>
    <div class="wt"><div class="glyph" style="font-weight:700;">Aa</div><div class="name">Bold 700</div></div>
    <div class="wt"><div class="glyph" style="font-weight:300; font-style:italic; color: var(--homium-cyan);">Aa</div><div class="name">Italic Light 300</div></div>
    <div class="wt"><div class="glyph" style="font-weight:400; font-style:italic;">Aa</div><div class="name">Italic 400</div></div>
    <div class="wt"><div class="glyph" style="font-weight:500; font-style:italic;">Aa</div><div class="name">Italic Med 500</div></div>
    <div class="wt"><div class="glyph" style="font-weight:900;">Aa</div><div class="name">Black 900</div></div>
  </div>
</div></body></html>
