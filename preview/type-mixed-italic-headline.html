<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 26px 28px; gap: 0; }
  h2 { font-family: var(--font-display); font-weight: 300; font-size: 44px; line-height: 1.05; letter-spacing: -0.02em; margin: 0 0 4px; }
  h2 em { font-style: italic; font-weight: 300; color: var(--homium-cyan); }
  h3 { font-size: 22px; font-weight: 400; line-height: 1.2; margin: 14px 0 4px; }
  .bk { color: var(--homium-cyan); font-size: 13px; font-style: italic; font-weight: 300; }
</style></head>
<body><div class="card">
  <h2>Somos aliados.</h2>
  <div class="bk">[ no proveedores ]</div>
  <h3>Desarrollamos productos <em>a la medida.</em></h3>
  <div class="bk">[ Software para aplicaciones web ]</div>
</div></body></html>
