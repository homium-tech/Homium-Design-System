<!doctype html>
<html class="theme-light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .card { padding: 28px; gap: 0; min-height: 260px; }
  .hero {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 56px;
    line-height: 1.02;
    letter-spacing: -0.02em;
    color: #4a1170; /* purple-500 — reads clearly as purple on white */
  }
  .hero em      { font-style: italic; font-weight: 300; color: #8e57bf; } /* purple-300 — lighter accent */
  .hero .period { color: #4a1170; }
  .meta { margin-top: 18px; display:flex; gap:16px; font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); }
  .meta span b { color: var(--fg-muted); font-weight: 500; }
</style></head>
<body class="theme-light"><div class="card">
  <div class="hero">Tecnología sin<br><em>complicaciones</em><span class="period">.</span></div>
  <div class="meta">
    <span><b>Rubik</b> · 56px / 1.02</span>
    <span>purple-500 #4A1170 · italic purple-300 #8E57BF</span>
    <span>tonal purple hierarchy</span>
  </div>
</div></body></html>
