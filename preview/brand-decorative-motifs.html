<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px; gap: 16px; }
  .grid { display:grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; }
  .demo { border: 1px solid var(--border); border-radius: 14px; padding: 18px; display:flex; align-items:center; justify-content:center; min-height: 130px; position: relative; overflow: hidden; }
  .demo svg { display:block; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); letter-spacing: 0.06em; text-transform: uppercase; text-align:center; }
  .cell { display:flex; flex-direction:column; gap: 8px; }

  /* dashed circle stack */
  .stack svg { width: 110px; height: 110px; color: var(--homium-cyan); }

  /* running text circle */
  .running { width: 130px; height: 130px; position: relative; color: var(--homium-cyan); }
  .running .arrow { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; font-size: 22px; }
  .running text { font-size: 9px; letter-spacing: 0.18em; }

  /* hand arrow */
  .arr svg { width: 130px; height: 70px; color: var(--homium-cyan); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="cell">
      <div class="demo stack">
        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor">
          <circle cx="50" cy="50" r="48" stroke-dasharray="2 6" stroke-width="1"/>
          <circle cx="50" cy="50" r="36" stroke-dasharray="2 4" stroke-width="1" opacity="0.7"/>
          <circle cx="50" cy="50" r="24" stroke-width="1" opacity="0.5"/>
          <circle cx="50" cy="50" r="3" fill="currentColor"/>
        </svg>
      </div>
      <div class="lbl">Dashed concentric circles</div>
    </div>

    <div class="cell">
      <div class="demo">
        <div class="running">
          <svg viewBox="0 0 130 130">
            <defs><path id="arc" d="M 65 65 m -55 0 a 55 55 0 1 1 110 0 a 55 55 0 1 1 -110 0"/></defs>
            <text fill="currentColor"><textPath href="#arc">VISITAR SITIO WEB · VISITAR SITIO WEB · </textPath></text>
          </svg>
          <div class="arrow">↗</div>
        </div>
      </div>
      <div class="lbl">Running text · ↗</div>
    </div>

    <div class="cell">
      <div class="demo arr">
        <svg viewBox="0 0 140 70" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M 10 50 C 30 50, 50 10, 90 18 L 120 26"/>
          <path d="M 110 16 L 124 24 L 116 36"/>
        </svg>
      </div>
      <div class="lbl">Hand arrow</div>
    </div>
  </div>
</div></body></html>
