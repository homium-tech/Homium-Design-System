<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; gap: 12px; }
  .row { display:flex; align-items:center; gap: 14px; }
  .name { width: 56px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .px   { width: 50px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-align:right; }
  .bar  { height: 14px; background: var(--homium-cyan); border-radius: 3px; }
</style></head>
<body><div class="card">
  <div class="row"><div class="name">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="name">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="name">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="name">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="name">sp-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="name">sp-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="name">sp-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="name">sp-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="name">sp-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
  <div class="row"><div class="name">sp-10</div><div class="bar" style="width:128px"></div><div class="px">128 px</div></div>
</div></body></html>
