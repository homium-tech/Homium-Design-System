<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; gap: 16px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .pcard {
    border: 1px solid var(--homium-cyan);
    border-radius: 16px;
    padding: 14px 14px 16px;
    background: rgba(0,255,255,0.02);
    display:flex; flex-direction: column; gap: 10px;
  }
  .meta { display:flex; justify-content: space-between; align-items: baseline; }
  .meta .name { font-size: 13px; font-weight: 500; }
  .meta .arr { color: var(--homium-cyan); font-size: 14px; }
  .img {
    border-radius: 10px;
    background: #e9efe8 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><rect width="200" height="100" fill="%23d8efe6"/><text x="10" y="35" font-family="sans-serif" font-size="14" fill="%2300332b">Brands that</text><text x="10" y="55" font-family="sans-serif" font-size="14" fill="%2300332b">effectively narrate</text><text x="10" y="75" font-family="sans-serif" font-size="14" fill="%2300332b">their own story</text></svg>') center/cover;
    height: 96px;
  }
  .img.two { background:#fdf6e3 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><rect width="200" height="100" fill="%23fff4d5"/><circle cx="150" cy="50" r="35" fill="none" stroke="%23ff3bd4" stroke-width="6"/><text x="14" y="34" font-family="sans-serif" font-size="13" fill="%23333">Vive la vida</text><text x="14" y="52" font-family="sans-serif" font-size="13" fill="%23333">como tú quieras.</text></svg>') center/cover; }
  .cap { font-size: 11px; color: var(--fg-subtle); line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="pcard">
      <div class="meta"><span class="name">Aluzian</span><span class="arr">↗</span></div>
      <div class="img"></div>
      <div class="cap">Suspendisse nisi diam, convallis eget erat nec, pellentesque tincidunt mi.</div>
    </div>
    <div class="pcard">
      <div class="meta"><span class="name">Vitavi</span><span class="arr">↗</span></div>
      <div class="img two"></div>
      <div class="cap">Suspendisse nisi diam, convallis eget erat nec, pellentesque tincidunt mi.</div>
    </div>
  </div>
</div></body></html>
