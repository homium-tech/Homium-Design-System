<!doctype html>
<html class="theme-light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .card { padding: 32px 36px; gap: 28px; min-height: 320px; }
  .line {
    font-family: var(--font-display);
    font-weight: 300;
    font-size: 44px;
    line-height: 1.06;
    letter-spacing: -0.02em;
    color: #4a1170; /* purple-500 — reads clearly as purple */
  }
  .line em { font-style: italic; font-weight: 300; color: #8e57bf; } /* purple-300 */
  .bracket { font-size: 13px; letter-spacing: 0.04em; color: var(--accent); margin-left: 14px; font-weight: 400; }
  .bracket::before { content: '[ '; }
  .bracket::after  { content: ' ]'; }
  .stack { display:flex; flex-direction:column; gap: 22px; }
  .row { display:flex; align-items: baseline; flex-wrap: wrap; }
  .foot { display:flex; gap: 18px; font-size: 11px; color: var(--fg-subtle); font-family: var(--font-mono); margin-top: auto; }
  .foot b { color: var(--fg-muted); font-weight: 500; }
</style></head>
<body class="theme-light"><div class="card">
  <div class="stack">
    <div class="row"><span class="line">Somos aliados<span style="color:#4a1170;">.</span></span><span class="bracket">no proveedores</span></div>
    <div class="row"><span class="line">Desarrollamos productos <em>a la medida<span style="color:#8e57bf;">.</span></em></span></div>
    <div class="row"><span class="line">Somos gente seria<span style="color:#4a1170;">.</span></span><span class="bracket">Profesionales que aman lo que hacen</span></div>
  </div>
  <div class="foot">
    <span><b>display</b> · purple-500 #4A1170</span>
    <span><b>italic</b> · purple-300 #8E57BF</span>
    <span><b>[bracket]</b> · cyan-700 #00B8B8</span>
  </div>
</div></body></html>
