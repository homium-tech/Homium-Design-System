<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HOMIUM — Nuestro trabajo</title>
  <link rel="icon" href="../../assets/logo/homium-bolt-white.svg" />
  <link rel="stylesheet" href="kit.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="Brackets.jsx"></script>
  <script type="text/babel" src="Buttons.jsx"></script>
  <script type="text/babel" src="Layout.jsx"></script>
  <script type="text/babel" src="Cards.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    const CATEGORIES = [
      'Todos', 'Procesamiento de datos', 'Business CMR', 'Clips animados', 'Ilustración',
      'Video juegos', 'Servidores dedicados', 'Sitios web', 'AWS', 'Hosting'
    ];

    const PROJECTS = [
      { name: 'Third Way Health',  tone: 'mint',   label: "We're revolutionizing medical",  cat: 'Sitios web' },
      { name: 'Vitavi',            tone: 'cream',  label: 'Vive la vida como tú quieras.',  cat: 'Sitios web' },
      { name: 'Aluzian',           tone: 'paper',  label: 'Brands that effectively narrate',cat: 'Ilustración' },
      { name: 'Sazú',              tone: 'paper',  label: 'Solucionamos los retos estratégicos', cat: 'Business CMR' },
      { name: 'A Medical Group',   tone: 'mint',   label: 'Your trusted medical provider',  cat: 'Sitios web' },
      { name: 'Presto',            tone: 'pred',   label: 'CHIQUITOS PERO SABROSOS',        cat: 'Clips animados' },
      { name: 'Oma',               tone: 'coffee', label: 'Maripuccino · $3.900',           cat: 'Sitios web' },
      { name: 'Peugeot',           tone: 'auto',   label: 'Peugeot 2008',                   cat: 'Sitios web' },
      { name: 'Opel Colombia',     tone: 'paper',  label: 'Crossland — Nuevo diseño',       cat: 'Sitios web' },
      { name: 'Jeep',              tone: 'auto',   label: 'JEEP GLADIATOR',                 cat: 'Sitios web' },
      { name: 'Dodge',             tone: 'auto',   label: 'Dodge Durango GT',               cat: 'Sitios web' },
      { name: 'Fiat',              tone: 'auto',   label: 'FIAT CRONOS · $1.142.588',       cat: 'Sitios web' },
      { name: 'Ram',               tone: 'auto',   label: 'RAM 700 · $738.468',             cat: 'Sitios web' },
      { name: 'Ser Colombia',      tone: 'sun',    label: 'Energía limpia para Colombia',   cat: 'Sitios web' },
      { name: 'Crem Helado',       tone: 'candy',  label: 'Aldhi · Los mejores combos',     cat: 'Ilustración' },
      { name: 'Unicentro Bogotá',  tone: 'purple', label: 'UNIFEST 2023',                   cat: 'Sitios web' },
    ];

    function App() {
      const [cat, setCat] = React.useState('Todos');
      const filtered = cat === 'Todos' ? PROJECTS : PROJECTS.filter(p => p.cat === cat);

      return (
        <div className="page">
          <Header />
          <div className="container">
            <section className="section">
              <SectionEyebrow>Nuestro trabajo</SectionEyebrow>
              <h1 style={{
                fontFamily: 'var(--font-display)',
                fontWeight: 300,
                fontSize: 'clamp(56px, 7vw, 96px)',
                lineHeight: 1.02,
                letterSpacing: '-0.02em',
                margin: '0 0 24px',
                maxWidth: '14ch'
              }}>Conoce nuestros<br/>proyectos</h1>
              <div className="chips">
                {CATEGORIES.map(c => (
                  <button key={c} className={"chip" + (cat === c ? " active" : "")} onClick={() => setCat(c)}>{c}</button>
                ))}
              </div>
              <div className="project-grid">
                {filtered.map(p => (
                  <ProjectCard key={p.name} {...p} onClick={() => location.href = 'detail.html'} />
                ))}
              </div>
            </section>
            <SocialRow />
            <ContactForm />
            <Footer />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
